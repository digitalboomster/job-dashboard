name: Daily job scrape

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: job dash/scraper/requirements.txt

      - name: Install dependencies
        working-directory: job dash
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: job dash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python scraper/scrape.py

      - name: Commit jobs.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "job dash/jobs.json"
          if git diff --staged --quiet; then
            echo "No changes to jobs.json"
            exit 0
          fi
          git commit -m "Daily scrape $(date -u +%Y-%m-%d)"
          git push
